<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="icon" href="../../../../../assets/logo_transparent.png" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机构详情 | Agency Ahrefs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
            colors: {
              brand: {
                orange: '#ff8000',
                blue: '#1462ff',
                navy: '#012f56',
                gray: '#5e617d',
                light: '#f8fafc'
              }
            }
          }
        }
      }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; letter-spacing: 0.01em; -webkit-font-smoothing: antialiased; }
        .font-heading { font-family: 'Inter', sans-serif; }
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        details[open] summary { border-bottom: 1px solid #f8fafc; margin-bottom: 0.75rem; }
    @keyframes gradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      .animate-gradient { animation: gradient 6s ease infinite; background-size: 200% auto; }
      @keyframes shimmer { 100% { transform: translateX(100%); } }
    </style>
</head>
<body class="bg-gray-50 text-slate-800 antialiased overflow-y-scroll">

    <!-- Header Navigation (Global) -->
    <header class="fixed inset-x-0 top-0 z-40 border-b border-gray-100 bg-white/90 backdrop-blur-xl shadow-sm">
      <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-3 md:px-6 md:py-4">
        <a href="index.html" class="flex items-center gap-3">
          <img src="../../../../../assets/logo_transparent.png" alt="Agency Ahrefs SEO Authority Logo" class="h-8 w-auto object-contain">
        </a>
        <a href="agencies.html" class="flex items-center gap-2 text-brand-gray hover:text-brand-orange font-bold transition-colors text-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          返回列表
        </a>
      </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 lg:px-6 py-12 pt-32">
        
        <!-- Not Found State -->
        <div id="not-found" class="hidden text-center py-20 max-w-2xl mx-auto">
            <h1 class="text-4xl font-black text-slate-900 mb-4">未找到该机构</h1>
            <p class="text-slate-600 mb-8 font-medium">您查找的机构可能已被移除或地址不正确，请返回机构目录。</p>
            <a href="agencies.html" class="inline-flex px-8 py-3 bg-brand-blue text-white font-bold rounded-xl hover:bg-blue-700 transition-colors shadow-lg shadow-blue-100">返回目录</a>
        </div>

        <div id="profile-content" class="opacity-0 transition-opacity duration-500">
            <!-- Normal Header Card -->
            <div class="bg-white rounded-[2.5rem] p-8 md:p-12 mb-10 shadow-sm border border-gray-100 relative overflow-hidden">
                <div class="flex flex-col md:flex-row gap-10 items-start relative z-10 w-full">
                    
                    <!-- Agency Logo Container -->
                    <div id="logo-container" class="w-36 h-36 rounded-3xl border border-gray-100 shadow-inner flex items-center justify-center p-4 overflow-hidden shrink-0 bg-white">
                        <img id="agency-logo" src="" alt="Agency Logo" class="w-full h-full object-contain mix-blend-multiply opacity-100">
                    </div>

                    <!-- Profile Details -->
                    <div class="flex-grow flex flex-col justify-center py-1">
                        <h1 class="text-4xl flex flex-wrap items-center gap-3 font-black text-slate-900 tracking-tight font-heading mb-3">
                            <span id="agency-name">机构名称</span>
                            <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-emerald-50 text-emerald-600 text-[13px] font-black tracking-widest uppercase border border-emerald-100 shadow-sm mt-1 sm:mt-0">
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                                权威评测认证
                            </span>
                        </h1>
                        
                        <div id="agency-tagline" class="text-brand-blue font-bold text-lg mb-6">机构服务标语</div>
                        
                        <div class="flex flex-wrap items-center gap-x-8 gap-y-3 text-[14px] font-bold text-slate-500">
                            <!-- Rating -->
                            <div class="flex items-center gap-2">
                                <span class="flex items-center gap-1 text-yellow-400">
                                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                                    <span id="agency-rating" class="text-slate-800 text-[16px]">0.0</span>
                                </span>
                                <span>综合评分</span>
                            </div>
                            <!-- Reviews -->
                            <div class="flex items-center gap-2">
                                <span class="flex items-center gap-2">
                                    <svg class="w-5 h-5 opacity-40 text-slate-900" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                                    <span id="agency-reviews" class="text-slate-800 text-[16px]">0</span>
                                </span>
                                <span>条权威评价</span>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="mt-8 flex flex-wrap items-center gap-4">
                            <a id="agency-website-btn" href="#" target="_blank" class="inline-flex items-center gap-2 px-7 py-3.5 bg-brand-navy text-white font-black rounded-xl hover:bg-slate-800 transition-colors shadow-lg shadow-slate-200 uppercase tracking-wide text-sm">
                                访问官方网站
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                            </a>
                            <div id="agency-socials" class="flex items-center gap-2.5">
                                <!-- Social dynamically inserted -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Live Website Preview Showcase -->
            <div id="agency-preview-container" class="mb-14 hidden group relative w-full rounded-3xl overflow-hidden border border-gray-200 bg-gray-100 shadow-sm aspect-video md:aspect-[21/9] hover:shadow-xl transition-shadow">
                <!-- Loading Spinner -->
                <div class="absolute inset-0 flex items-center justify-center">
                    <svg class="animate-spin w-8 h-8 text-brand-blue/40" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </div>
                <!-- Dynamic Image -->
                <img id="agency-preview-img" src="" alt="Live Website Preview" class="w-full h-full object-cover object-top relative z-10 transition-transform duration-[1.5s] ease-out group-hover:scale-[1.03] cursor-pointer" onclick="window.open(document.getElementById('agency-website-btn').href, '_blank')" onload="this.previousElementSibling.style.display='none'" onerror="this.parentElement.style.display='none'">
                
                <!-- Gradient Overlay -->
                <div class="absolute inset-0 bg-gradient-to-t from-slate-900/70 via-slate-900/10 to-transparent z-20 pointer-events-none"></div>
                
                <!-- Authority Badge Label -->
                <div class="absolute bottom-6 left-6 md:left-8 z-30 flex items-center gap-3">
                    <span class="px-3.5 py-1.5 bg-black/40 backdrop-blur-md rounded-lg text-white text-[13px] font-bold border border-white/20 shadow-sm flex items-center gap-2">
                        <svg class="w-4 h-4 text-emerald-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"></path></svg>
                        官方机构实时影像抓取
                    </span>
                </div>
            </div>

            <!-- Intro Paragraph -->
            <p id="agency-description" class="text-slate-600 font-medium text-[16px] leading-[1.8] mb-14 px-2 lg:px-0">
                加载中...
            </p>

            <!-- Grid -->
            <div class="grid md:grid-cols-2 gap-x-16 gap-y-16 mb-16 border-b border-gray-200 pb-16 px-2 lg:px-0">
                
                <!-- Business Overview -->
                <div class="bg-white rounded-[2rem] p-10 shadow-sm border border-gray-100 h-full">
                    <h2 class="text-[22px] font-black text-slate-900 mb-8 tracking-tight font-heading">业务概览</h2>
                    
                    <div id="overview-list" class="space-y-6 relative">
                        <!-- Inserted dynamically -->
                    </div>
                </div>

                <!-- Core Expertise -->
                <div class="bg-white rounded-[2rem] p-10 shadow-sm border border-gray-100 h-full">
                    <h2 class="text-[22px] font-black text-slate-900 mb-8 tracking-tight font-heading">核心专长与体系</h2>
                    
                    <div id="expertise-list" class="space-y-5">
                        <!-- Inserted dynamically -->
                    </div>
                </div>
                
            </div>

            <!-- Platform Verdict -->
            <section class="mb-16 px-2 lg:px-0">
                <h2 class="text-[22px] font-black text-slate-900 mb-8 tracking-tight font-heading flex items-center gap-3">
                    <svg class="w-6 h-6 text-brand-orange" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    平台评测结论
                </h2>
                <div class="text-[16px] text-slate-600 leading-[1.8] space-y-7">
                    <p id="agency-verdict" class="bg-slate-100 p-8 rounded-2xl border border-slate-200 italic font-medium border-l-4 border-l-brand-orange text-slate-700">加载中...</p>
                </div>
            </section>

            <!-- Market Coverage -->
            <section class="mb-20 px-2 lg:px-0">
                <h2 class="text-[22px] font-black text-slate-900 mb-6 tracking-tight font-heading">市场与客户画像</h2>
                <div class="text-[16px] text-slate-600 leading-[1.8] space-y-7 font-medium">
                    <p id="agency-market">加载中...</p>
                </div>
            </section>

            <!-- Frequently Asked Questions -->
            <section class="mb-24 px-2 lg:px-0">
                <h2 class="text-[22px] font-black text-slate-900 mb-8 tracking-tight font-heading">常见问题与解答 (FAQ)</h2>
                <div id="agency-faq" class="flex flex-col gap-3">
                    <!-- Inserted dynamically -->
                </div>
            </section>
        </main>
    </div>

    <!-- Agency Data & Logic -->
    <script src="data/agencies_data.js?v=3"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            // Default ID for testing if not provided
            let agencyId = params.get('id');
            if(!agencyId) { agencyId = 'brandthirty'; }

            if (typeof agencyData === 'undefined') return;
            const data = agencyData.find(a => a.id === agencyId);

            if (!data) {
                document.getElementById('not-found').classList.remove('hidden');
                document.getElementById('profile-content').classList.add('hidden');
                return;
            }

            // Populate Text Elements
            document.title = data.name + " | 机构详情 | Agency Ahrefs";
            document.getElementById('agency-name').innerText = data.name;
            document.getElementById('agency-tagline').innerText = data.tagline;
            document.getElementById('agency-rating').innerText = (data.rating / 2).toFixed(1);
            document.getElementById('agency-reviews').innerText = data.reviewCount;
            document.getElementById('agency-description').innerText = data.description;
            document.getElementById('agency-verdict').innerText = data.verdict;

            // Links and Socials
            const websiteBtn = document.getElementById('agency-website-btn');
            const previewContainer = document.getElementById('agency-preview-container');
            const previewImg = document.getElementById('agency-preview-img');

            if (data.website) {
                websiteBtn.href = data.website;
                websiteBtn.style.display = 'inline-flex';
                
                // Construct Thumbnail live capture API call
                const targetUrl = data.website.replace(/^https?:\/\//, ''); 
                previewImg.src = `https://image.thum.io/get/width/1200/crop/800/noanimate/https://${targetUrl}`;
                previewContainer.classList.remove('hidden');
                previewContainer.classList.add('block');
            } else {
                websiteBtn.style.display = 'none';
                previewContainer.classList.add('hidden');
            }

            const socialsContainer = document.getElementById('agency-socials');
            let socialsHtml = '';
            if (data.socials) {
                if (data.socials.linkedin) {
                    socialsHtml += `<a href="${data.socials.linkedin}" target="_blank" class="w-12 h-12 rounded-xl bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-400 hover:bg-brand-blue hover:text-white transition-all shadow-sm"><svg class="w-[20px] h-[20px]" fill="currentColor" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg></a>`;
                }
                if (data.socials.twitter) {
                    socialsHtml += `<a href="${data.socials.twitter}" target="_blank" class="w-12 h-12 rounded-xl bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-400 hover:bg-sky-500 hover:text-white transition-all shadow-sm"><svg class="w-[20px] h-[20px]" fill="currentColor" viewBox="0 0 24 24"><path d="M24 4.557c-.883.392-1.832.656-2.828.775 1.017-.609 1.798-1.574 2.165-2.724-.951.564-2.005.974-3.127 1.195-.897-.957-2.178-1.555-3.594-1.555-3.179 0-5.515 2.966-4.797 6.045-4.091-.205-7.719-2.165-10.148-5.144-1.29 2.213-.669 5.108 1.523 6.574-.806-.026-1.566-.247-2.229-.616-.054 2.281 1.581 4.415 3.949 4.89-.693.188-1.452.232-2.224.084.626 1.956 2.444 3.379 4.6 3.419-2.07 1.623-4.678 2.348-7.29 2.04 2.179 1.397 4.768 2.212 7.548 2.212 9.142 0 14.307-7.721 13.995-14.646.962-.695 1.797-1.562 2.457-2.549z"/></svg></a>`;
                }
            }
            socialsContainer.innerHTML = socialsHtml;
            
            // Market Coverage text
            const marketText = `${data.name} 的核心服务语言包含 <strong class="text-slate-900">${data.languages.join('、')}</strong>，其地理业务重心主要分布在 <strong class="text-slate-900">${data.geoFocus.join('、')}</strong> 等市场。在目标客户体量方面，他们专注于服务 <strong class="text-slate-900">${data.clientSize.join('、')}</strong> 级别的品牌，并且在 <strong class="text-slate-900">${data.industries.join('、')}</strong> 等重点行业拥有深厚的战略执行经验。`;
            document.getElementById('agency-market').innerHTML = marketText;

            // Logo setup
            const logoImg = document.getElementById('agency-logo');
            logoImg.src = data.logo;
            logoImg.onerror = () => { logoImg.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(data.name)}&background=f8fafc&color=012f56&size=256&font-size=0.35&bold=true`; };
            if (data.logoBg) {
                document.getElementById('logo-container').style.backgroundColor = data.logoBg;
                if(data.logoBg.toLowerCase() !== '#ffffff' && data.logoBg.toLowerCase() !== 'white') {
                    logoImg.classList.remove('mix-blend-multiply');
                }
            }

            // Overview List (Left Column)
            const overviewHtml = `
                <div class="flex gap-4 items-center">
                    <div class="w-[42px] h-[42px] rounded-xl flex items-center justify-center shrink-0 bg-blue-50 text-blue-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                    </div>
                    <div>
                        <p class="text-slate-400 font-bold uppercase tracking-wider text-[11px] mb-0.5">成立年份</p>
                        <h3 class="font-black text-slate-900 text-[15px]">${data.founded} 年</h3>
                    </div>
                </div>
                
                <div class="flex gap-4 items-center">
                    <div class="w-[42px] h-[42px] rounded-xl flex items-center justify-center shrink-0 bg-orange-50 text-brand-orange">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </div>
                    <div>
                        <p class="text-slate-400 font-bold uppercase tracking-wider text-[11px] mb-0.5">总部核心位置</p>
                        <h3 class="font-black text-slate-900 text-[15px]">${data.location}</h3>
                    </div>
                </div>

                <div class="flex gap-4 items-center">
                    <div class="w-[42px] h-[42px] rounded-xl flex items-center justify-center shrink-0 bg-emerald-50 text-emerald-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    </div>
                    <div>
                        <p class="text-slate-400 font-bold uppercase tracking-wider text-[11px] mb-0.5">全球团队规模</p>
                        <h3 class="font-black text-slate-900 text-[15px]">${data.headcount}</h3>
                    </div>
                </div>

                <div class="flex gap-4 items-center">
                    <div class="w-[42px] h-[42px] rounded-xl flex items-center justify-center shrink-0 bg-purple-50 text-purple-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <div>
                        <p class="text-slate-400 font-bold uppercase tracking-wider text-[11px] mb-0.5">参考起步预算与典型周期</p>
                        <h3 class="font-black text-slate-900 text-[15px]">${data.budget} / ${data.duration}</h3>
                    </div>
                </div>
            `;
            document.getElementById('overview-list').innerHTML = overviewHtml;

            // Expertise List
            let expertiseHtml = '';
            data.services.forEach((service, index) => {
                expertiseHtml += `
                <div class="flex gap-4 items-center">
                    <div class="w-[38px] h-[38px] bg-slate-900 flex items-center justify-center shrink-0 rounded-lg shadow-sm">
                        <svg class="w-[18px] h-[18px] text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <div>
                        <h3 class="font-bold text-slate-800 text-[15.5px]">${service}</h3>
                    </div>
                </div>
                `;
            });
            document.getElementById('expertise-list').innerHTML = expertiseHtml;

            // FAQs Dynamic Build
            const faqs = data.faqs || [];

            let faqHtml = '';
            faqs.forEach((faq) => {
                faqHtml += `
                <details class="group bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm hover:shadow-md transition-shadow">
                    <summary class="flex items-center justify-between cursor-pointer p-6 font-bold text-[16px] text-slate-900 bg-gray-50/30">
                        <span class="flex gap-2.5 items-center">
                            <span class="text-brand-orange font-black">Q:</span> 
                            <span>${faq.q}</span>
                        </span>
                        <span class="transition-transform group-open:rotate-180 text-slate-400">
                            <svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="20"><path d="M6 9l6 6 6-6"></path></svg>
                        </span>
                    </summary>
                    <div class="px-6 pb-6 pt-2 text-slate-600 text-[15.5px] leading-[1.8] font-medium border-t border-gray-100 bg-white">
                        <span class="text-slate-400 font-bold mr-2 text-[14px]">答:</span>${faq.a}
                    </div>
                </details>
                `;
            });
            document.getElementById('agency-faq').innerHTML = faqHtml;

            // Show UI
            document.getElementById('profile-content').classList.remove('opacity-0');
        });
    </script>
</body>
</html>
